<style>
.spinner-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #F9F9F9;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 4000;
  overflow: hidden;
  transition: opacity 0.4s ease;
}

/* ---- Elegant Luxury Spinner ---- */
.lux-spinner {
  width: 50px;
  height: 50px;
  border: 3px solid rgba(6, 14, 37, 0.2);
  border-top: 3px solid #060E25;
  border-radius: 50%;
  animation: spin 1s cubic-bezier(0.55, 0.1, 0.45, 0.9) infinite;
  box-shadow: 0 0 10px rgba(6, 14, 37, 0.15);
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Fade-out */
body.loading {
  overflow: hidden;
}
</style>

<script>
document.body.classList.add("loading");

window.addEventListener("load", () => {
  const spinner = document.getElementById("spinner");
  setTimeout(() => {
    spinner.style.opacity = 0;
    setTimeout(() => {
      spinner.style.display = "none";
      document.body.classList.remove("loading");
    }, 500);
  }, 500);
});
</script>

<style>
/* Hamburger SVG */
.hamburger-svg {
  height: 3em;
  width: 3em;
  cursor: pointer;
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
}

.line {
  fill: none;
  stroke: #f9f9f9df;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 3;
  transition: stroke-dasharray 0.6s cubic-bezier(0.4,0,0.2,1),
              stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1);
}

.line-top-bottom {
  stroke-dasharray: 12 63;
}

/* Hamburger open/close animation */
.navbar-toggler.collapsed svg {
  transform: rotate(0);
}

.navbar-toggler:not(.collapsed) svg {
  transform: rotate(-45deg);
}

.navbar-toggler:not(.collapsed) .line-top-bottom {
  stroke-dasharray: 20 300;
  stroke-dashoffset: -32.42;
}

/* Navbar links - luxury style */
.lux-menu .nav-link {
  font-family: 'Space Grotesk', sans-serif !important;
  font-weight: 400;
  font-size: 1rem;
  color: #060E25;
  position: relative;
  margin: 0 12px;
  transition: all 0.3s ease;
}

.lux-menu .nav-link::after {
  content: '';
  position: absolute;
  left: 50%;
  bottom: -4px;
  transform: translateX(-50%);
  width: 0%;
  height: 2px;
  background: #060E25;
  border-radius: 2px;
  transition: width 0.4s ease;
}

.lux-menu .nav-link:hover::after {
  width: 50%;
}

.lux-menu .nav-link:hover {
  transform: translateY(-2px);
}

/* Luxury button */
.lux-btn {
  font-weight: 500;
  padding: 0.5rem 1.8rem;
  font-size: 1rem;
  border-radius: 50px;
  transition: all 0.4s ease;
  box-shadow: 0 5px 15px rgba(6,14,37,0.2);
}

.lux-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(6,14,37,0.35);
  background-color: #060E25;
  color: #fff;
}

/* Overlay effect */
body.menu-open-overlay::before {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.25);
  z-index: 998;
  pointer-events: none;
  transition: opacity 0.4s ease;
  opacity: 1;
}

body {
  transition: all 0.4s ease;
}

/* Mobile adjustments */
@media (max-width: 992px) {
  .navbar-toggler {
    display: block;
    background: none;
    border: none;
  }

  .collapse.navbar-collapse {
    transition: all 0.5s ease;
    position: relative;
    z-index: 1001; /* above overlay */
    background: inherit; /* keep navbar color */
    padding: 15px 0;
  }

  .lux-menu .nav-link {
    font-size: 1.2rem;
    padding: 12px 0;
    display: block;
    text-align: center;
  }

  .lux-btn {
    display: block;
    margin: 20px auto;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const navbarCollapse = document.getElementById('navbarCollapse');
  const body = document.body;

  const updateBodyOverlay = () => {
    if (navbarCollapse.classList.contains('show')) {
      body.classList.add('menu-open-overlay');
    } else {
      body.classList.remove('menu-open-overlay');
    }
  }

  // Observe menu open/close
  navbarCollapse.addEventListener('show.bs.collapse', updateBodyOverlay);
  navbarCollapse.addEventListener('hide.bs.collapse', updateBodyOverlay);

  // Close overlay when link clicked inside menu
  document.querySelectorAll('#navbarCollapse .nav-link').forEach(link => {
    link.addEventListener('click', () => {
      if (navbarCollapse.classList.contains('show')) {
        $(navbarCollapse).collapse('hide'); // Bootstrap collapse
      }
    });
  });
});
</script>

<style>
/* === STRUCTURE & OFFICIAL WEBSITE COLOR (#1A1817) === */
.hero-carousel-section {
    position: relative;
    width: 100%;
    background-color: #1A1817; /* Matches exactly your website theme */
    overflow: hidden;
}

/* Perfect soft fade overlay starting deep from your official brand color #1A1817 */
.hero-overlay-gradient {
    position: absolute;
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    background: linear-gradient(90deg, rgba(26, 24, 23, 0.95) 0%, rgba(26, 24, 23, 0.75) 35%, rgba(26, 24, 23, 0.2) 100%);    z-index: 2;
    pointer-events: none;
}

/* Custom alignment layout wrapper replacing broken .carousel-caption */
.hero-content-left-container {

/* === TYPOGRAPHIES & BRANDS === */
.hero-text-block .text-title {
    display: inline-block;

/* === PREMIUM INTERACTIVE BUTTONS === */
.lux-btn-modern {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    background: transparent;
    border: 1px solid #BDA36A;

    padding: 14px 34px;

.luxury-divider {

    bottom: 0; left: 0; width: 100%; height: 3px;
    background: #BDA36A;
    z-index: 4;
}

/* === CONTINUOUS SLOW ZOOM/MOVE EFFECT === */
.zoom-slide {
    animation: cinematicZoom 15s ease-in-out infinite alternate;
    transform-origin: center center;
    z-index: 1;
}

@keyframes cinematicZoom {
    0% { transform: scale(1) translate(0,0); }
    25% { transform: scale(1.05) translate(-10px,-5px); }
    50% { transform: scale(1.1) translate(10px,5px); }
    75% { transform: scale(1.05) translate(-5px,10px); }
    100% { transform: scale(1) translate(0,0); }
}

/* === ANIMATED TEXT/TITLE/PARAGRAPH/BUTTON === */
.animated-slide .text-title,
.animated-slide h3,
.animated-slide p {
    opacity: 0;
    transform: translateY(-50px);
}
.animated-slide .c-button {
    opacity: 0;
    transform: translateY(50px);
}

.carousel-item.active .text-title { animation: titleDrop 1s forwards 0.3s; }
.carousel-item.active h3 { animation: titleDrop 1s forwards 0.6s; }
.carousel-item.active p { animation: fadeIn 1s forwards 0.9s; }
.carousel-item.active .c-button { animation: buttonRise 1s forwards 1.2s; }

@keyframes titleDrop { to { opacity: 1; transform: translateY(0); } }
@keyframes buttonRise { to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
